<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>部屋割り表</title>
<style>
  :root{
    --bg:#F5F3EC; --paper:#FFFFFF; --ink:#26302A; --muted:#7E877F; --line:#E4E1D6;
    --green:#3F8F5B; --green-soft:#E7F1EA; --green-ring:#57A972;
    --up:#5B7CB0; --up-soft:#EAF0F8; --down:#B07A3E; --down-soft:#F6EEDF;
    --danger:#B4513F; --shadow:0 1px 2px rgba(38,48,42,.06),0 2px 8px rgba(38,48,42,.05);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Segoe UI",sans-serif;
    -webkit-text-size-adjust:100%; padding-bottom:96px;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 12px;}

  header{position:sticky;top:0;z-index:20;background:linear-gradient(var(--bg) 78%,rgba(245,243,236,0));padding:14px 0 6px;}
  .titlebar{display:flex;align-items:baseline;gap:10px;padding:0 4px;}
  h1{font-size:19px;font-weight:700;letter-spacing:.04em;margin:0;}
  .date-input{font:inherit;font-size:15px;font-weight:600;color:var(--green);border:none;background:transparent;width:96px;padding:2px 0;border-bottom:1.5px dashed var(--line);}
  .date-input:focus{outline:none;border-bottom-color:var(--green);}
  .modebar{display:flex;gap:6px;margin:12px 4px 0;background:#ECEAE1;padding:4px;border-radius:12px;}
  .modebar button{flex:1;border:none;background:transparent;font:inherit;font-weight:600;font-size:14px;color:var(--muted);padding:9px 0;border-radius:9px;transition:.15s;}
  .modebar button.on{background:var(--paper);color:var(--ink);box-shadow:var(--shadow);}
  .hint{margin:8px 4px 0;font-size:12.5px;color:var(--muted);line-height:1.5;min-height:18px;}
  .hint b{color:var(--green);font-weight:700;}

  .floor{margin-top:16px;}
  .floor-label{font-size:12px;font-weight:700;letter-spacing:.14em;color:var(--muted);padding:0 2px 7px;display:flex;align-items:center;gap:8px;}
  .floor-label::after{content:"";flex:1;height:1px;background:var(--line);}

  .plan{display:grid;gap:5px;align-items:stretch;}
  .cell{border-radius:9px;min-height:46px;overflow:hidden;}
  .util{background:#F1EFE7;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;font-weight:600;text-align:center;padding:4px;line-height:1.25;}
  .void{background:transparent;}
  .box{background:#FAF9F4;border:1px dashed var(--line);}
  .room{background:var(--green-soft);border:1px solid #CFE3D6;display:flex;flex-direction:column;padding:5px;}
  .room .rno{font-size:10.5px;font-weight:800;color:var(--green);letter-spacing:.03em;margin:0 1px 4px;}

  .beds{flex:1;display:flex;flex-direction:column;gap:3px;}
  .beds.grid4{display:grid;grid-template-columns:1fr 1fr;gap:3px;}

  .bd{background:#fff;border:1px solid #D6E6DC;border-radius:6px;display:flex;align-items:center;gap:5px;padding:6px 7px;cursor:pointer;min-height:34px;transition:.12s;}
  .beds.grid4 .bd{flex-direction:column;align-items:flex-start;gap:2px;padding:5px 6px;min-height:40px;}
  .bd .l{font-size:9px;font-weight:800;padding:1px 4px;border-radius:3px;flex:none;line-height:1.3;}
  .l.up{color:var(--up);background:var(--up-soft);}
  .l.dn{color:var(--down);background:var(--down-soft);}
  .bd .nm{font-size:13px;font-weight:600;line-height:1.2;white-space:normal;word-break:break-word;}
  .beds.grid4 .bd .nm{width:100%;}
  .bd.empty{border-style:dashed;}
  .bd.empty .nm{color:var(--muted);font-weight:500;}
  .bd.sel{border-color:var(--green-ring);background:var(--green-soft);box-shadow:0 0 0 2px rgba(63,143,91,.22);}
  .bd.flash{animation:flash .5s ease;}
  @keyframes flash{0%{background:#FFF6D9;}100%{}}
  .bd .edit-in{font:inherit;font-size:13px;font-weight:600;border:none;background:transparent;width:100%;padding:0;color:var(--ink);}
  .bd .edit-in:focus{outline:none;}

  .actions{position:fixed;left:0;right:0;bottom:0;z-index:30;background:linear-gradient(rgba(245,243,236,0),var(--bg) 34%);padding:14px;display:flex;gap:8px;max-width:560px;margin:0 auto;}
  .actions button{flex:1;font:inherit;font-weight:700;font-size:14.5px;border-radius:12px;padding:14px 0;border:1.5px solid var(--line);background:var(--paper);color:var(--ink);box-shadow:var(--shadow);transition:.12s;}
  .actions button:active{transform:scale(.98);}
  .actions .primary{background:var(--green);color:#fff;border-color:var(--green);}
  .actions .reset{color:var(--danger);}

  .sheet-bg{position:fixed;inset:0;z-index:40;background:rgba(38,48,42,.4);display:none;align-items:flex-end;}
  .sheet-bg.show{display:flex;}
  .sheet{width:100%;max-width:560px;margin:0 auto;background:var(--paper);border-radius:18px 18px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -6px 24px rgba(0,0,0,.14);}
  .sheet h2{font-size:15px;margin:0 0 10px;}
  .sheet textarea{width:100%;height:240px;font:inherit;font-size:13px;line-height:1.7;border:1px solid var(--line);border-radius:10px;padding:12px;resize:none;background:#FCFBF7;color:var(--ink);}
  .sheet .row{display:flex;gap:8px;margin-top:12px;}
  .sheet .row button{flex:1;font:inherit;font-weight:700;font-size:14.5px;border-radius:11px;padding:13px 0;border:1.5px solid var(--line);background:var(--paper);color:var(--ink);}
  .sheet .row .primary{background:var(--green);color:#fff;border-color:var(--green);}
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(10px);background:var(--ink);color:#fff;font-size:13.5px;font-weight:600;padding:11px 18px;border-radius:24px;opacity:0;pointer-events:none;transition:.22s;z-index:50;box-shadow:0 4px 16px rgba(0,0,0,.2);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="titlebar">
      <h1>部屋割り表</h1>
      <input class="date-input" id="dateInput" value="7/3(金)" aria-label="日付">
    </div>
    <div class="modebar">
      <button id="modeSwap" class="on">入替</button>
      <button id="modeEdit">編集</button>
    </div>
    <div class="hint" id="hint"></div>
  </header>
  <main id="floors"></main>
</div>

<div class="actions">
  <button class="reset" id="btnReset">元に戻す</button>
  <button class="primary" id="btnCopy">テキストで出力</button>
</div>

<div class="sheet-bg" id="sheetBg">
  <div class="sheet">
    <h2>コピーして LINE・メモに貼り付け</h2>
    <textarea id="sheetText" readonly></textarea>
    <div class="row">
      <button id="sheetClose">閉じる</button>
      <button class="primary" id="sheetCopy">コピー</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============ 間取り定義（7/3 部屋割り表を再現）============ */
const FLOORS = [
  {
    name:"1F",
    cols:"1.05fr 0.92fr 0.92fr 1.25fr",
    areas:[
      "office  gen1  gen2  gen3",
      "r101    cor   cor   liv",
      "laundry sem1  sem1  liv",
      "shower  sem2  sem2  liv",
      "toilet  nando nando kit",
    ],
    cells:[
      {area:"office",type:"util",label:"OFFICE"},
      {area:"gen1",type:"util",label:"玄関"},
      {area:"gen2",type:"util",label:"玄関"},
      {area:"gen3",type:"util",label:"玄関"},
      {area:"cor",type:"void"},
      {area:"liv",type:"util",label:"リビング"},
      {area:"sem1",type:"util",label:"洗面台"},
      {area:"sem2",type:"util",label:"洗面台"},
      {area:"nando",type:"util",label:"納戸"},
      {area:"kit",type:"util",label:"キッチン"},
      {area:"laundry",type:"util",label:"ランドリー"},
      {area:"shower",type:"util",label:"シャワー"},
      {area:"toilet",type:"util",label:"トイレ"},
      {area:"r101",type:"room",no:"101",beds:[{label:"上",name:"タクユ"},{label:"下",name:"シュウゴ"}]},
    ]
  },
  {
    name:"2F",
    cols:"1fr 1fr 0.5fr 1.6fr",
    areas:[
      "r203  r204  sem   sem",
      "r202  r202  cor   r205",
      "r202  r202  cor   r205",
      "r201  r201  cor   r205",
      "shwrL box   shwrM r206",
      "toilL box   toilM r206",
    ],
    cells:[
      {area:"r203",type:"room",no:"203",beds:[{label:"上",name:"ジオン"},{label:"下",name:"イッキ"}]},
      {area:"r204",type:"room",no:"204",beds:[{label:"上",name:"モトキ"},{label:"下",name:"ケンゴ"}]},
      {area:"sem",type:"util",label:"洗面台"},
      {area:"r202",type:"room",no:"202",beds:[
        {label:"左上",name:"レンタ"},{label:"右上",name:"ソクユ"},
        {label:"左下",name:"ケイジ"},{label:"右下",name:"コウヤ"}]},
      {area:"cor",type:"void"},
      {area:"r205",type:"room",no:"205",beds:[
        {label:"左上",name:"ダイキ"},{label:"右上",name:"トラノスケ"},
        {label:"左下",name:"シンタロウ"},{label:"右下",name:"マサト"}]},
      {area:"r201",type:"room",no:"201",beds:[{label:"上",name:""},{label:"下",name:"ダイチ"}]},
      {area:"shwrL",type:"util",label:"シャワー"},
      {area:"toilL",type:"util",label:"トイレ"},
      {area:"box",type:"box"},
      {area:"shwrM",type:"util",label:"シャワー"},
      {area:"toilM",type:"util",label:"トイレ"},
      {area:"r206",type:"room",no:"206",beds:[{label:"",name:"アヤト"}]},
    ]
  },
  {
    name:"3F",
    cols:"1fr 1fr 1.15fr 1.15fr 1fr",
    areas:[
      "r301 r305 r304 r304 r302",
      "r301 r305 r304 r304 r302",
      "gap  toil kit  r303 veranda",
    ],
    cells:[
      {area:"r301",type:"room",no:"301",beds:[{label:"上",name:"ハルト"},{label:"下",name:"カイト"}]},
      {area:"r305",type:"room",no:"305",beds:[{label:"上",name:"トシハル"},{label:"下",name:"ケイタ"}]},
      {area:"r304",type:"room",no:"304",beds:[
        {label:"左上",name:"レンスケ"},{label:"右上",name:"ユウタ"},
        {label:"左下",name:"オオタカ"},{label:"右下",name:"ムツキ"}]},
      {area:"r302",type:"room",no:"302",beds:[{label:"上",name:"ショウタロウ"},{label:"下",name:"ボーダオ"}]},
      {area:"gap",type:"void"},
      {area:"toil",type:"util",label:"トイレ"},
      {area:"kit",type:"util",label:"キッチン"},
      {area:"r303",type:"room",no:"303",beds:[{label:"上",name:"ケイ"},{label:"下",name:"リコウ"}]},
      {area:"veranda",type:"util",label:"ベランダ"},
    ]
  }
];

const KEY="resta-roomchart-plan-v2";
const INITIAL_DATE="7/3(金)";
const INITIAL_NAMES=extractNames();
let currentDate=INITIAL_DATE;

/* ---------- 保存（Claudeアプリ・GitHub Pages 両対応）---------- */
const store={
  async get(k){try{if(window.storage){const r=await window.storage.get(k);return r?r.value:null;}}catch(e){}try{return localStorage.getItem(k);}catch(e){return null;}},
  async set(k,v){try{if(window.storage){await window.storage.set(k,v,false);return;}}catch(e){}try{localStorage.setItem(k,v);}catch(e){}},
  async del(k){try{if(window.storage){await window.storage.delete(k,false);return;}}catch(e){}try{localStorage.removeItem(k);}catch(e){}}
};

/* ---------- 状態 ---------- */
let mode="swap", selected=null, editing=null;
const same=(a,b)=>a&&b&&a.no===b.no&&a.b===b.b;

function findBed(sel){
  for(const f of FLOORS) for(const c of f.cells) if(c.no===sel.no) return c.beds[sel.b];
  return null;
}
function extractNames(){
  const m={};
  for(const f of FLOORS) for(const c of f.cells) if(c.type==="room") m[c.no]=c.beds.map(b=>b.name);
  return JSON.parse(JSON.stringify(m));
}
function applyNames(m){
  for(const f of FLOORS) for(const c of f.cells) if(c.type==="room"&&m[c.no]) c.beds.forEach((b,i)=>{ if(m[c.no][i]!==undefined) b.name=m[c.no][i]; });
}

/* ---------- 描画 ---------- */
const floorsEl=document.getElementById("floors");
const hintEl=document.getElementById("hint");

function render(){
  floorsEl.innerHTML="";
  FLOORS.forEach(floor=>{
    const sec=document.createElement("section"); sec.className="floor";
    sec.innerHTML=`<div class="floor-label">${floor.name}</div>`;
    const plan=document.createElement("div");
    plan.className="plan";
    plan.style.gridTemplateColumns=floor.cols;
    plan.style.gridTemplateAreas=floor.areas.map(r=>`"${r}"`).join(" ");
    floor.cells.forEach(cell=>{
      const el=document.createElement("div");
      el.style.gridArea=cell.area;
      if(cell.type==="util"){ el.className="cell util"; el.textContent=cell.label; }
      else if(cell.type==="void"){ el.className="cell void"; }
      else if(cell.type==="box"){ el.className="cell box"; }
      else {
        el.className="cell room";
        const rno=document.createElement("div"); rno.className="rno"; rno.textContent=cell.no;
        const beds=document.createElement("div");
        const n=cell.beds.length;
        beds.className="beds "+(n===4?"grid4":n===1?"single":"stack");
        cell.beds.forEach((bed,bi)=>{
          const pos={no:cell.no,b:bi};
          const bd=document.createElement("div"); bd.className="bd";
          bd.dataset.no=cell.no; bd.dataset.b=bi;
          if(!bed.name) bd.classList.add("empty");
          if(same(selected,pos)) bd.classList.add("sel");
          const up=bed.label.includes("上"), dn=bed.label.includes("下");
          const pill = bed.label?`<span class="l ${up?"up":dn?"dn":""}">${bed.label}</span>`:"";
          if(editing&&same(editing,pos)){
            bd.innerHTML=pill;
            const inp=document.createElement("input"); inp.className="edit-in"; inp.value=bed.name; inp.placeholder="名前";
            bd.appendChild(inp); bd.classList.remove("empty");
            setTimeout(()=>{inp.focus();inp.select();},0);
            const commit=()=>{ bed.name=inp.value.trim(); editing=null; save(); render(); };
            inp.addEventListener("blur",commit);
            inp.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();inp.blur();}});
          }else{
            bd.innerHTML=pill+`<span class="nm">${bed.name||"空き"}</span>`;
            bd.addEventListener("click",()=>onBed(pos));
          }
          beds.appendChild(bd);
        });
        el.appendChild(rno); el.appendChild(beds);
      }
      plan.appendChild(el);
    });
    sec.appendChild(plan);
    floorsEl.appendChild(sec);
  });
  updateHint();
}

function updateHint(){
  if(mode==="edit") hintEl.innerHTML="名前を<b>タップ</b>して書き換え。空欄にすると「空き」になります。";
  else if(selected){ const n=findBed(selected).name||"空き"; hintEl.innerHTML=`<b>${n}</b> を選択中 — 交換したい相手をタップ`; }
  else hintEl.innerHTML="入れ替えたい名前を<b>2つ</b>タップすると交換します。";
}

/* ---------- 操作 ---------- */
function onBed(pos){
  if(mode==="edit"){ editing=pos; selected=null; render(); return; }
  if(!selected){ selected=pos; render(); return; }
  if(same(selected,pos)){ selected=null; render(); return; }
  const a=findBed(selected), b=findBed(pos);
  const t=a.name; a.name=b.name; b.name=t;
  const p1=selected, p2=pos; selected=null;
  save(); render(); flash(p1); flash(p2);
}
function flash(pos){
  const el=floorsEl.querySelector(`.bd[data-no="${pos.no}"][data-b="${pos.b}"]`);
  if(el){ el.classList.add("flash"); setTimeout(()=>el.classList.remove("flash"),500); }
}

/* ---------- モード ---------- */
const bSwap=document.getElementById("modeSwap"), bEdit=document.getElementById("modeEdit");
bSwap.onclick=()=>{mode="swap";selected=null;editing=null;bSwap.classList.add("on");bEdit.classList.remove("on");render();};
bEdit.onclick=()=>{mode="edit";selected=null;editing=null;bEdit.classList.add("on");bSwap.classList.remove("on");render();};

/* ---------- 日付 ---------- */
const dateInput=document.getElementById("dateInput");
dateInput.addEventListener("input",()=>{currentDate=dateInput.value;save();});

/* ---------- リセット ---------- */
document.getElementById("btnReset").onclick=async()=>{
  if(confirm("最初の部屋割りに戻します。よろしいですか？")){
    await store.del(KEY);
    applyNames(JSON.parse(JSON.stringify(INITIAL_NAMES)));
    currentDate=INITIAL_DATE; dateInput.value=currentDate;
    selected=null; editing=null; render(); toast("元に戻しました");
  }
};

/* ---------- テキスト出力 ---------- */
function buildText(){
  let out=`【部屋割り表】${currentDate}\n`;
  FLOORS.forEach(f=>{
    out+=`\n■${f.name}\n`;
    f.cells.filter(c=>c.type==="room").forEach(c=>{
      const parts=c.beds.map(b=>{const nm=b.name||"（空）";return b.label?`${b.label}：${nm}`:nm;});
      out+=`${c.no}  ${parts.join("／")}\n`;
    });
  });
  return out.trim();
}
const sheetBg=document.getElementById("sheetBg"), sheetText=document.getElementById("sheetText");
document.getElementById("btnCopy").onclick=()=>{sheetText.value=buildText();sheetBg.classList.add("show");};
document.getElementById("sheetClose").onclick=()=>sheetBg.classList.remove("show");
sheetBg.addEventListener("click",e=>{if(e.target===sheetBg)sheetBg.classList.remove("show");});
document.getElementById("sheetCopy").onclick=async()=>{
  const txt=sheetText.value;
  try{await navigator.clipboard.writeText(txt);toast("コピーしました");}
  catch(e){sheetText.focus();sheetText.select();toast("長押しでコピーしてください");}
};

/* ---------- トースト ---------- */
const toastEl=document.getElementById("toast");let toastTimer;
function toast(m){toastEl.textContent=m;toastEl.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>toastEl.classList.remove("show"),1600);}

/* ---------- 保存・読込 ---------- */
let saveTimer;
function save(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>store.set(KEY,JSON.stringify({date:currentDate,names:extractNames()})),250);}
async function load(){
  const raw=await store.get(KEY);
  if(raw){try{const s=JSON.parse(raw);if(s.names)applyNames(s.names);if(s.date)currentDate=s.date;}catch(e){}}
  dateInput.value=currentDate; render();
}
load();
</script>
</body>
</html>
